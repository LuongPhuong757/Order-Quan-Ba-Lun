services:
  mysql:
    image: mysql:8.0
    container_name: order_quan_balun_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-order_quan_balun}
      MYSQL_USER: ${MYSQL_USER:-order_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-order_app_pass}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
